apiVersion: v1
kind: ServiceAccount
metadata:
  name: registry-sa
  namespace: default
imagePullSecrets:
- name: my-registry-secret
---
apiVersion: v1
kind: Pod
metadata:
  name: sa-pull-secret
spec:
  serviceAccountName: registry-sa
  containers:
  - name: app
    image: private-registry.example.com/app:v1
    imagePullPolicy: IfNotPresent
