apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: observability
    rules:
    - alert: PrometheusDown
      expr: up{job="prometheus"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Prometheus is down"
        description: "Cannot scrape Prometheus metrics"

    - alert: CardinalityExplosion
      expr: prometheus_tsdb_symbol_table_size_bytes > 1e9
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "High cardinality detected"
        description: "Symbol table > 1GB - check for label cardinality issues"

    - alert: MetricsStorageFull
      expr: |
        (prometheus_tsdb_storage_blocks_bytes /
         prometheus_tsdb_storage_blocks_bytes offset 1h) > 1.1
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "Prometheus storage growing fast"

    - alert: ScrapeTargetDown
      expr: up == 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Target {{ $labels.job }}/{{ $labels.instance }} is down"
