apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-operator-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: database-operator
rules:
- apiGroups: ["example.com"]
  resources: ["databases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["example.com"]
  resources: ["databases/status"]
  verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: db-operator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: database-operator
subjects:
- kind: ServiceAccount
  name: db-operator-sa
  namespace: default
