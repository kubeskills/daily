apiVersion: v1
kind: Pod
metadata:
  name: impossible-affinity
  namespace: capacity-test
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: node-type
            operator: In
            values:
            - gpu-node
          - key: region
            operator: In
            values:
            - us-east-99
  containers:
  - name: app
    image: nginx:alpine
    resources:
      requests:
        cpu: "100m"
        memory: 128Mi
