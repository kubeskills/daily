apiVersion: apps/v1
kind: Deployment
metadata:
  name: protected-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: protected-app
  template:
    metadata:
      labels:
        app: protected-app
    spec:
      priorityClassName: high-priority
      containers:
      - name: nginx
        image: nginx
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "100m"
