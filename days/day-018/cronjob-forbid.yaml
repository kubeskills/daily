apiVersion: batch/v1
kind: CronJob
metadata:
  name: slow-job-forbid
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: sleeper
            image: busybox
            command:
            - /bin/sh
            - -c
            - echo "Forbid job started at $(date)"; sleep 300; echo "Forbid job finished"
          restartPolicy: Never
