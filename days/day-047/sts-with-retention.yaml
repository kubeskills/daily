apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web-with-retention
spec:
  serviceName: stateful-svc
  replicas: 2
  selector:
    matchLabels:
      app: retention-test
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Retain
  template:
    metadata:
      labels:
        app: retention-test
    spec:
      containers:
      - name: nginx
        image: nginx
        volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
