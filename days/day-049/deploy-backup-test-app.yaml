apiVersion: v1
kind: Namespace
metadata:
  name: backup-test
  labels:
    app: test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
  namespace: backup-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  namespace: backup-test
spec:
  selector:
    app: nginx
  ports:
  - port: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: backup-test
data:
  config.json: |
    {"environment": "production"}
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: backup-test
type: Opaque
stringData:
  password: "super-secret-password"
