apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: path-types-demo
spec:
  ingressClassName: nginx
  rules:
  - host: paths.example.com
    http:
      paths:
      # Prefix: matches /api and /api/users /api/v1/...
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: demo-v1
            port:
              number: 80
      # Exact: matches ONLY /health - not /healthz or /health/
      - path: /health
        pathType: Exact
        backend:
          service:
            name: demo-v2
            port:
              number: 80
