apiVersion: batch/v1
kind: Job
metadata:
  name: success-job
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      containers:
      - name: job
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Job completed successfully"; exit 0']
      restartPolicy: Never
---
apiVersion: batch/v1
kind: Job
metadata:
  name: failing-job
spec:
  backoffLimit: 3
  template:
    spec:
      containers:
      - name: job
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Failing on purpose"; exit 1']
      restartPolicy: Never
---
apiVersion: batch/v1
kind: Job
metadata:
  name: timeout-job
spec:
  activeDeadlineSeconds: 10
  template:
    spec:
      containers:
      - name: job
        image: busybox:1.36
        command: ['sh', '-c', 'sleep 60']
      restartPolicy: Never
---
apiVersion: batch/v1
kind: Job
metadata:
  name: parallel-job
spec:
  completions: 6
  parallelism: 3
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      containers:
      - name: job
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Processing item $HOSTNAME"; sleep 5']
      restartPolicy: Never
