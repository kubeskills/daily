apiVersion: v1
kind: Pod
metadata:
  name: init-chain-success
spec:
  initContainers:
  - name: init-db-check
    image: busybox:1.36
    command: ['sh', '-c', 'echo "Checking DB"; sleep 2; echo "DB ready"']
  - name: init-migrate
    image: busybox:1.36
    command: ['sh', '-c', 'echo "Running migrations"; sleep 2; echo "Migrations done"']
  - name: init-warm-cache
    image: busybox:1.36
    command: ['sh', '-c', 'echo "Warming cache"; sleep 1; echo "Cache warm"']
  containers:
  - name: app
    image: nginx:alpine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-with-init
spec:
  replicas: 2
  selector:
    matchLabels:
      app: init-demo
  template:
    metadata:
      labels:
        app: init-demo
    spec:
      initContainers:
      - name: init-config
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Generating config..."
          echo "server { listen 80; }" > /config/nginx.conf
          echo "Config ready"
        volumeMounts:
        - name: config
          mountPath: /config
      containers:
      - name: app
        image: nginx:alpine
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: config
        emptyDir: {}
