apiVersion: flowcontrol.apiserver.k8s.io/v1beta3
kind: PriorityLevelConfiguration
metadata:
  name: cicd-priority
spec:
  type: Limited
  limited:
    nominalConcurrencyShares: 30
    limitResponse:
      type: Queue
      queuing:
        queues: 64
        queueLengthLimit: 50
        handSize: 6
---
apiVersion: flowcontrol.apiserver.k8s.io/v1beta3
kind: FlowSchema
metadata:
  name: cicd-flows
spec:
  matchingPrecedence: 500
  priorityLevelConfiguration:
    name: cicd-priority
  rules:
  - subjects:
    - kind: ServiceAccount
      serviceAccount:
        name: cicd-bot
        namespace: cicd
    resourceRules:
    - apiGroups: ["*"]
      resources: ["*"]
      verbs: ["*"]
