apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: broken-storage
spec:
  serviceName: broken-svc
  replicas: 1
  selector:
    matchLabels:
      app: broken
  template:
    metadata:
      labels:
        app: broken
    spec:
      containers:
      - name: app
        image: nginx:alpine
        volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      storageClassName: nonexistent-class
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
# StatefulSet with OnDelete strategy
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ondelete-web
spec:
  serviceName: ondelete-svc
  replicas: 2
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app: ondelete
  template:
    metadata:
      labels:
        app: ondelete
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
---
# StatefulSet with partition-based rollout
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: partition-web
spec:
  serviceName: partition-svc
  replicas: 4
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 2
  selector:
    matchLabels:
      app: partition
  template:
    metadata:
      labels:
        app: partition
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
