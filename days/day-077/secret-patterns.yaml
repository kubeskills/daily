apiVersion: v1
kind: Secret
metadata:
  name: db-creds
type: Opaque
stringData:
  username: admin
  password: supersecret123
---
# GOOD: Mount secret as read-only volume
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-secure-secret
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure
  template:
    metadata:
      labels:
        app: secure
    spec:
      containers:
      - name: app
        image: nginx:alpine
        volumeMounts:
        - name: db-creds
          mountPath: /etc/secrets/db
          readOnly: true
      volumes:
      - name: db-creds
        secret:
          secretName: db-creds
          defaultMode: 0400
---
# BAD: Secret as environment variable (visible in /proc)
apiVersion: v1
kind: Pod
metadata:
  name: env-secret-pod
spec:
  containers:
  - name: app
    image: nginx:alpine
    env:
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-creds
          key: password
